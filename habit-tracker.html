<!DOCTYPE html>
<html>
<head>
    <title>My Habit Tracker</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 20px auto;
            padding: 20px;
            background: #f4f4f4;
        }

        h1 {
            text-align: center;
        }

        .input-section {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 10px;
        }

        button {
            padding: 10px 15px;
            cursor: pointer;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: white;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .completed {
            text-decoration: line-through;
            color: green;
        }

        .progress {
            text-align: center;
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h1>📅 Daily Habit Tracker</h1>

<div class="input-section">
    <input type="text" id="habitInput" placeholder="Enter a habit">
    <button onclick="addHabit()">Add Habit</button>
</div>

<ul id="habitList"></ul>

<div class="progress" id="progress">
    Progress: 0%
</div>

<script>
    let habits = JSON.parse(localStorage.getItem("habits")) || [];

    function saveHabits() {
        localStorage.setItem("habits", JSON.stringify(habits));
    }

    function updateProgress() {
        const completed = habits.filter(h => h.done).length;
        const total = habits.length;

        const percent = total === 0 ? 0 :
            Math.round((completed / total) * 100);

        document.getElementById("progress").innerText =
            `Progress: ${percent}% (${completed}/${total})`;
    }

    function renderHabits() {
        const list = document.getElementById("habitList");
        list.innerHTML = "";

        habits.forEach((habit, index) => {
            const li = document.createElement("li");

            li.innerHTML = `
                <span class="${habit.done ? 'completed' : ''}">
                    ${habit.name}
                </span>
                <div>
                    <input type="checkbox"
                        ${habit.done ? 'checked' : ''}
                        onchange="toggleHabit(${index})">
                    <button onclick="deleteHabit(${index})">
                        ❌
                    </button>
                </div>
            `;

            list.appendChild(li);
        });

        updateProgress();
    }

    function addHabit() {
        const input = document.getElementById("habitInput");

        if (input.value.trim() === "") return;

        habits.push({
            name: input.value,
            done: false
        });

        input.value = "";

        saveHabits();
        renderHabits();
    }

    function toggleHabit(index) {
        habits[index].done = !habits[index].done;

        saveHabits();
        renderHabits();
    }

    function deleteHabit(index) {
        habits.splice(index, 1);

        saveHabits();
        renderHabits();
    }

    renderHabits();
</script>

</body>
</html>
